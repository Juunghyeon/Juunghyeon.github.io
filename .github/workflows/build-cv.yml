name: Build CV PDF

on:
  push:
    paths:
      - 'cv/main.tex'
      - 'cv/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv/main.tex
          work_in_root_file_dir: true

      - name: Move PDF to assets
        run: |
          mkdir -p assets/files
          mv cv/main.pdf assets/files/cv.pdf

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/files/cv.pdf
          git diff --staged --quiet || git commit -m "Auto-build CV PDF"
          git push
